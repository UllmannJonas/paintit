name: Build Windows and MacOS executables on Tag

on:
  push:
    tags:
      - 'v*.*'    # Trigger on version tags like v1.0
      - 'dev-*.*' # Trigger on development tags like dev-1.0

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --group dev
          uv pip install pyinstaller
          pip install pyinstaller
      
      - name: Build Windows executable
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed --add-data=assets:assets --icon=assets/brush.ico paintit.py
      
      - name: Build MacOS executable
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --windowed --add-data=assets:assets --icon=assets/brush.ico paintit.py

      - name: Upload Windows executable
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: paintit
          path: dist/paintit.exe

      - name: Upload MacOS executable
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: paintit
          path: dist/paintit.app